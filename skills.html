<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kỹ năng | Nguyễn Vũ Gia Hân</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>
  <div class="floating-blobs">
    <span class="blob blob1"></span>
    <span class="blob blob2"></span>
    <span class="blob blob3"></span>
  </div>

  <header class="topbar glass">
    <div class="logo">Dreamcore Portfolio</div>
    <nav>
      <a href="index.html">Trang chủ</a>
      <a href="about.html">Giới thiệu</a>
      <a href="hobbies.html">Sở thích</a>
      <a href="achievements.html">Thành tựu</a>
      <a href="skills.html">Kỹ năng</a>
    </nav>
  </header>

  <main class="container page fade-in">
    <section class="page-card glass slide-up">
      <p class="badge">Strengths</p>
      <h1>Sở trường & Kỹ năng</h1>
      <div class="chips">
        <span class="chip">Ngoại ngữ</span>
        <span class="chip">Leadership skills</span>
        <span class="chip">Drum</span>
        <span class="chip">Piano</span>
        <span class="chip">Guitar</span>
      </div>

      <div class="stats-grid two-col">
        <div class="stat-card hover-lift">
          <h2>IELTS</h2>
          <div class="big-number">6.5</div>
        </div>
        <div class="stat-card hover-lift">
          <h2>DELF</h2>
          <div class="big-number">B1</div>
        </div>
        <div class="stat-card hover-lift">
          <h2>Nhạc cụ</h2>
          <div class="big-number">3</div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
